<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Left speech bubble -->
  <rect x="80" y="160" width="160" height="120" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <polygon points="120,280 100,320 150,280" fill="#FFFFFF" opacity="0.95"/>
  <!-- Left bubble lines -->
  <rect x="112" y="196" width="96" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <rect x="112" y="220" width="72" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <rect x="112" y="244" width="56" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <!-- Right speech bubble -->
  <rect x="272" y="200" width="160" height="120" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <polygon points="380,320 392,360 350,320" fill="#FFFFFF" opacity="0.95"/>
  <!-- Right bubble lines -->
  <rect x="304" y="236" width="96" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <rect x="304" y="260" width="64" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <rect x="304" y="284" width="80" height="8" rx="4" fill="#6366F1" opacity="0.3"/>
  <!-- Bridge arc connecting the two bubbles -->
  <path d="M230 230 C256 170, 260 170, 280 250" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Small dots on the bridge -->
  <circle cx="256" cy="195" r="6" fill="#FFFFFF" opacity="0.7"/>
</svg>
