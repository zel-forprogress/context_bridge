<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Left node -->
  <circle cx="120" cy="200" r="40" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="120" cy="200" r="20" fill="#FFFFFF"/>
  <!-- Right node -->
  <circle cx="392" cy="200" r="40" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="392" cy="200" r="20" fill="#FFFFFF"/>
  <!-- Bridge arc -->
  <path d="M120 200 Q256 100 392 200" stroke="url(#bridge)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M120 200 Q256 140 392 200" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Bridge pillars -->
  <rect x="180" y="200" width="6" height="80" rx="3" fill="#C4B5FD" opacity="0.7"/>
  <rect x="253" y="180" width="6" height="100" rx="3" fill="#C4B5FD" opacity="0.7"/>
  <rect x="326" y="200" width="6" height="80" rx="3" fill="#C4B5FD" opacity="0.7"/>
  <!-- Bridge deck -->
  <path d="M120 280 L392 280" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <!-- Bottom context nodes -->
  <circle cx="170" cy="360" r="24" fill="#A78BFA" opacity="0.8"/>
  <circle cx="170" cy="360" r="10" fill="#FFFFFF"/>
  <circle cx="256" cy="360" r="24" fill="#A78BFA" opacity="0.8"/>
  <circle cx="256" cy="360" r="10" fill="#FFFFFF"/>
  <circle cx="342" cy="360" r="24" fill="#A78BFA" opacity="0.8"/>
  <circle cx="342" cy="360" r="10" fill="#FFFFFF"/>
  <!-- Connection lines between bottom nodes -->
  <line x1="194" y1="360" x2="232" y2="360" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="360" x2="318" y2="360" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <!-- Vertical connections to bridge -->
  <line x1="170" y1="336" x2="170" y2="280" stroke="#FFFFFF" stroke-width="2" opacity="0.4" stroke-dasharray="4 4"/>
  <line x1="256" y1="336" x2="256" y2="280" stroke="#FFFFFF" stroke-width="2" opacity="0.4" stroke-dasharray="4 4"/>
  <line x1="342" y1="336" x2="342" y2="280" stroke="#FFFFFF" stroke-width="2" opacity="0.4" stroke-dasharray="4 4"/>
</svg>
